name: Daily AFGI Report

on:
  schedule:
    # 08:30 UTC = 16:30 Asia/Shanghai. Holiday skipping is handled by the trading-day guard below.
    - cron: "30 8 * * 1-5"
    # 08:40 UTC = 16:40 Asia/Shanghai fallback in case the first schedule is delayed or dropped.
    - cron: "40 8 * * 1-5"
    # 09:00 UTC = 17:00 Asia/Shanghai monitor: send only if today's sent marker is missing.
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: daily-afgi-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Refresh latest main
        run: git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check A-share trading day
        id: trading_day
        env:
          AFGI_REQUEST_TIMEOUT: "15"
        run: |
          if [ "$GITHUB_EVENT_NAME" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual run" >> "$GITHUB_OUTPUT"
            echo "Manual run, trading-day guard bypassed."
            exit 0
          fi
          python -m afgi.trading_day | tee trading-day-check.txt
          grep -E '^(should_run|run_date|latest_trade_date|reason)=' trading-day-check.txt >> "$GITHUB_OUTPUT"

      - name: Generate and send report
        if: steps.trading_day.outputs.should_run == 'true'
        env:
          AFGI_SEND_ENABLED: "true"
          AFGI_FORCE_RECALCULATE: "true"
          AFGI_SKIP_IF_SENT: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
          AFGI_REQUEST_TIMEOUT: "15"
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python -m afgi.main

      - name: Commit report snapshot
        if: steps.trading_day.outputs.should_run == 'true'
        run: |
          if [ -z "$(git status --porcelain reports data)" ]; then
            echo "No report or data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/*.md reports/*.json data/history/*.json
          if ls data/sent/*.json >/dev/null 2>&1; then
            git add data/sent/*.json
          fi
          git commit -m "chore: update daily AFGI report"
          git push
