name: Daily AFGI Report

on:
  schedule:
    # 08:45 UTC = 16:45 Asia/Shanghai. A-share close is 15:00.
    - cron: "45 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send report
        env:
          AFGI_SEND_ENABLED: "true"
          AFGI_REQUEST_TIMEOUT: "15"
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python -m afgi.main

      - name: Commit report snapshot
        run: |
          if [ -z "$(git status --porcelain reports data)" ]; then
            echo "No report or data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/*.md reports/*.json data/history/*.json
          git commit -m "chore: update daily AFGI report"
          git push
